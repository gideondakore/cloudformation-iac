AWSTemplateFormatVersion: 2010-09-09
Description: CloudFormation Template for automating creation of IAM Resources LAB with GitSync

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Environment Configuration"
        Parameters:
          - EnvType
    ParameterLabels:
      EnvType:
        default: "Environment Type"

Parameters:
  EnvType:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - staging
      - prod
    Description: Environment type for resource tagging

Resources:
  # One-Time Password stored in Secrets Manager
  OneTimePassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-IAM-OneTimePassword"
      Description: Auto-generated one-time password for IAM users
      GenerateSecretString:
        PasswordLength: 8
        ExcludeCharacters: '"@/\'
        RequireEachIncludedType: true
      Tags:
        - Key: Environment
          Value: !Ref EnvType
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Repository
          Value: iac-templates

  # S3 User Group with list permissions
  S3UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Sub "${AWS::StackName}-S3-Users"
      ManagedPolicyArns:
        - !Ref S3ListPolicy

  # EC2 User Group with list and create permissions
  EC2UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Sub "${AWS::StackName}-EC2-Users"
      ManagedPolicyArns:
        - !Ref EC2ListCreatePolicy

  # S3 List Policy
  S3ListPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AWS::StackName}-S3-List-Policy"
      Description: Policy to list S3 buckets
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:ListAllMyBuckets
            Resource: "*"

  # EC2 List and Create Policy
  EC2ListCreatePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AWS::StackName}-EC2-List-Create-Policy"
      Description: Policy to list and create EC2 instances
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceStatus
              - ec2:DescribeInstanceTypes
              - ec2:DescribeImages
              - ec2:DescribeKeyPairs
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeVpcs
              - ec2:RunInstances
              - ec2:CreateTags
            Resource: "*"

  # Password Change Policy
  PasswordChangePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AWS::StackName}-PasswordChange-Policy"
      Description: Policy to allow users to change their own password
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - iam:ChangePassword
              - iam:GetAccountPasswordPolicy
            Resource: "arn:aws:iam::*:user/${aws:username}"

  # IAM User: ec2-user1
  EC2User1:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user1
      Groups:
        - !Ref EC2UserGroup
        - !Ref PasswordChangePolicy
      LoginProfile:
        Password: !Sub "{{resolve:secretsmanager:${OneTimePassword}:SecretString}}"
        PasswordResetRequired: true
      Tags:
        - Key: Environment
          Value: !Ref EnvType
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Repository
          Value: iac-templates

  # IAM User: ec2-user2
  EC2User2:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user2
      Groups:
        - !Ref EC2UserGroup
        - !Ref PasswordChangePolicy
      LoginProfile:
        Password: !Sub "{{resolve:secretsmanager:${OneTimePassword}:SecretString}}"
        PasswordResetRequired: true
      Tags:
        - Key: Environment
          Value: !Ref EnvType
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Repository
          Value: iac-templates

  # Allow Policy for ec2-user2 to Allow creating EC2 instances (Demonsstrate inline policy)
  EC2User2AllowPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-EC2User2-Allow-RunInstances"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ec2:RunInstances
            Resource: "*"
      Users:
        - !Ref EC2User2

  # IAM User: s3-user
  S3User:
    Type: AWS::IAM::User
    Properties:
      UserName: s3-user
      Groups:
        - !Ref S3UserGroup
        - !Ref PasswordChangePolicy
      LoginProfile:
        Password: !Sub "{{resolve:secretsmanager:${OneTimePassword}:SecretString}}"
        PasswordResetRequired: true
      Tags:
        - Key: Environment
          Value: !Ref EnvType
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Repository
          Value: iac-templates

Outputs:
  OneTimePasswordSecretArn:
    Description: ARN of the Secrets Manager secret containing the one-time password
    Value: !Ref OneTimePassword
    Export:
      Name: !Sub "${AWS::StackName}-OneTimePasswordArn"

  S3UserGroupName:
    Description: Name of the S3 User Group
    Value: !Ref S3UserGroup
    Export:
      Name: !Sub "${AWS::StackName}-S3UserGroup"

  EC2UserGroupName:
    Description: Name of the EC2 User Group
    Value: !Ref EC2UserGroup
    Export:
      Name: !Sub "${AWS::StackName}-EC2UserGroup"

  EC2User1Name:
    Description: IAM username for ec2-user1
    Value: !Ref EC2User1

  EC2User2Name:
    Description: IAM username for ec2-user2 (can create EC2 instances)
    Value: !Ref EC2User2

  S3UserName:
    Description: IAM username for s3-user
    Value: !Ref S3User

  ConsoleLoginURL:
    Description: AWS Console login URL
    Value: !Sub "https://${AWS::AccountId}.signin.aws.amazon.com/console"
